<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | İhracatın Medyası</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;-webkit-font-smoothing:antialiased}
    :root{--green:#80d253;--card:#111;--border:rgba(255,255,255,.08);--muted:rgba(255,255,255,.55)}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;width:100%;max-width:400px;text-align:center}
    .login-logo{font-size:14px;font-weight:700;color:var(--green);margin-bottom:32px;display:flex;align-items:center;justify-content:center;gap:8px}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green)}
    .login-title{font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
    .login-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
    .inp{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:12px}
    .inp:focus{border-color:var(--green)}.inp::placeholder{color:rgba(255,255,255,.25)}
    .login-btn{width:100%;background:var(--green);color:#0a0a0a;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    .login-btn:hover{background:#5cf28e}
    .err{color:#ff6060;font-size:13px;margin-top:10px;display:none}
    .dash{display:none}
    .topbar{background:rgba(10,10,10,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
    .topbar-logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
    .topbar-right{display:flex;gap:10px}
    .btn-s{background:rgba(255,255,255,.07);border:1px solid var(--border);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
    .btn-s:hover{background:rgba(255,255,255,.14)}
    .main{max-width:1300px;margin:0 auto;padding:32px}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:28px}
    .sc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px 20px}
    .sc.hi{border-color:rgba(128,210,83,.3)}.sc.hi .sn{color:var(--green)}
    .sn{font-size:32px;font-weight:800;letter-spacing:-1px}
    .sl{font-size:12px;color:var(--muted);margin-top:4px;font-weight:500}
    .toolbar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
    .si{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:#fff;font-size:14px;font-family:inherit;outline:none;width:260px}
    .si:focus{border-color:var(--green)}.si::placeholder{color:rgba(255,255,255,.25)}
    .fs{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:#fff;font-size:13px;font-family:inherit;outline:none}
    .fs option{background:#111}
    .tw{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead th{padding:13px 18px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:left;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)}
    tbody tr{border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover{background:rgba(255,255,255,.03)}
    td{padding:14px 18px;font-size:13px;vertical-align:middle}
    .tn{font-weight:600;font-size:14px}.tm{color:var(--muted)}
    .badge{display:inline-block;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700}
    .b0{background:rgba(99,160,255,.15);color:#63a0ff}
    .b1{background:rgba(255,200,80,.12);color:#ffc850}
    .b2{background:rgba(160,100,255,.12);color:#a064ff}
    .b3{background:rgba(255,140,60,.12);color:#ff8c3c}
    .b4{background:rgba(128,210,83,.15);color:#80d253}
    .b5{background:rgba(255,255,255,.06);color:rgba(255,255,255,.4)}
    .ss{background:transparent;border:none;color:inherit;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;outline:none}
    .ss option{background:#111;color:#fff}
    .mb{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
    .mb.open{display:flex}
    .mc{background:#111;border:1px solid var(--border);border-radius:24px;padding:36px;max-width:500px;width:100%;max-height:90vh;overflow-y:auto}
    .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .mt{font-size:18px;font-weight:700}
    .mx{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.07);border:none;color:#fff;font-size:18px;cursor:pointer}
    .mr{display:flex;gap:8px;margin-bottom:12px}
    .ml{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);min-width:80px;padding-top:2px}
    .mv{font-size:14px;line-height:1.5}
    .md{border:none;border-top:1px solid var(--border);margin:20px 0}
    .empty{text-align:center;padding:60px 20px;color:var(--muted)}
    .ei{font-size:48px;margin-bottom:12px}
    .ga{display:flex;gap:10px;margin-top:24px}
    .ab{flex:1;text-align:center;display:block;text-decoration:none;padding:11px;border-radius:10px;font-size:13px;font-weight:700;border:1px solid var(--border);color:#fff;background:rgba(255,255,255,.07)}
    .ab.g{background:var(--green);color:#0a0a0a;border-color:var(--green)}
    @media(max-width:900px){.stats{grid-template-columns:1fr 1fr}.main{padding:20px}}
  </style>
</head>
<body>
<div class="login-wrap" id="lw">
  <div class="login-box">
    <div class="login-logo"><div class="dot"></div>İhracatın Medyası</div>
    <div class="login-title">Admin Paneli</div>
    <div class="login-sub">Devam etmek için şifrenizi girin</div>
    <input class="inp" type="password" id="pi" placeholder="Şifre" onkeydown="if(event.key==='Enter')login()" />
    <button class="login-btn" onclick="login()">Giriş Yap</button>
    <div class="err" id="le">Hatalı şifre. Tekrar deneyin.</div>
  </div>
</div>
<div class="dash" id="dash">
  <div class="topbar">
    <div class="topbar-logo"><div class="dot"></div>İhracatın Medyası — Admin</div>
    <div class="topbar-right">
      <button class="btn-s" onclick="exportCSV()">CSV İndir</button>
      <button class="btn-s" onclick="load()">Yenile</button>
      <button class="btn-s" onclick="logout()">Çıkış</button>
    </div>
  </div>
  <div class="main">
    <div class="stats">
      <div class="sc hi"><div class="sn" id="st">—</div><div class="sl">Toplam Başvuru</div></div>
      <div class="sc"><div class="sn" id="sy">—</div><div class="sl">Yeni</div></div>
      <div class="sc"><div class="sn" id="sg">—</div><div class="sl">Görüşme</div></div>
      <div class="sc"><div class="sn" id="sm">—</div><div class="sl">Müşteri Oldu</div></div>
      <div class="sc"><div class="sn" id="sb">—</div><div class="sl">Bugünkü</div></div>
    </div>
    <div class="toolbar">
      <input class="si" type="text" id="qi" placeholder="Ad, firma veya telefon ara..." oninput="render()" />
      <select class="fs" id="fd" onchange="render()">
        <option value="">Tüm Durumlar</option>
        <option>Yeni</option><option>İletişime Geçildi</option><option>Görüşme Planlandı</option>
        <option>Teklif Gönderildi</option><option>Müşteri Oldu</option><option>Kapandı</option>
      </select>
    </div>
    <div class="tw"><table>
      <thead><tr><th>Ad Soyad</th><th>Firma</th><th>Telefon</th><th>E-posta</th><th>Sektör</th><th>Tarih</th><th>Durum</th></tr></thead>
      <tbody id="tb"><tr><td colspan="7" class="empty">Yükleniyor...</td></tr></tbody>
    </table></div>
  </div>
</div>
<div class="mb" id="mb" onclick="if(event.target===this)closeMod()"><div class="mc" id="mc"></div></div>
<script>
const AK='ihracat2025';
let leads=[],ak='';
function login(){
  const p=document.getElementById('pi').value;
  if(p===AK){ak=p;document.getElementById('lw').style.display='none';document.getElementById('dash').style.display='block';load();}
  else{const e=document.getElementById('le');e.style.display='block';setTimeout(()=>e.style.display='none',2500);}
}
function logout(){ak='';document.getElementById('lw').style.display='flex';document.getElementById('dash').style.display='none';document.getElementById('pi').value='';}
async function load(){
  document.getElementById('tb').innerHTML='<tr><td colspan="7" class="empty">Yükleniyor...</td></tr>';
  try{
    const r=await fetch('/api/leads',{headers:{'x-admin-key':ak}});
    if(!r.ok)throw new Error();
    leads=await r.json();stats();render();
  }catch{document.getElementById('tb').innerHTML='<tr><td colspan="7" class="empty"><div class="ei">⚠️</div>Bağlantı hatası. Yenileyin.</td></tr>';}
}
function stats(){
  const t=new Date().toISOString().slice(0,10);
  document.getElementById('st').textContent=leads.length;
  document.getElementById('sy').textContent=leads.filter(l=>l.durum==='Yeni').length;
  document.getElementById('sg').textContent=leads.filter(l=>l.durum==='Görüşme Planlandı').length;
  document.getElementById('sm').textContent=leads.filter(l=>l.durum==='Müşteri Oldu').length;
  document.getElementById('sb').textContent=leads.filter(l=>l.tarih&&l.tarih.slice(0,10)===t).length;
}
function bc(d){const m={'Yeni':'b0','İletişime Geçildi':'b1','Görüşme Planlandı':'b2','Teklif Gönderildi':'b3','Müşteri Oldu':'b4','Kapandı':'b5'};return m[d]||'b0';}
function fd(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('tr-TR')+' '+d.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});}
function render(){
  const q=document.getElementById('qi').value.toLowerCase();
  const df=document.getElementById('fd').value;
  let ls=leads.filter(l=>{
    const m=!q||[l.ad,l.firma,l.telefon,l.email].join(' ').toLowerCase().includes(q);
    return m&&(!df||l.durum===df);
  });
  if(!ls.length){document.getElementById('tb').innerHTML='<tr><td colspan="7" class="empty"><div class="ei">📭</div>Başvuru bulunamadı</td></tr>';return;}
  document.getElementById('tb').innerHTML=ls.map(l=>`
    <tr onclick="openMod(${l.id})">
      <td><div class="tn">${l.ad||'—'}</div></td>
      <td>${l.firma||'—'}</td>
      <td>${l.telefon||'—'}</td>
      <td class="tm">${l.email||'—'}</td>
      <td class="tm">${l.sektor||'—'}</td>
      <td class="tm">${fd(l.tarih)}</td>
      <td onclick="event.stopPropagation()">
        <select class="ss badge ${bc(l.durum)}" onchange="upd(${l.id},this.value)">
          ${['Yeni','İletişime Geçildi','Görüşme Planlandı','Teklif Gönderildi','Müşteri Oldu','Kapandı'].map(s=>`<option ${l.durum===s?'selected':''} value="${s}">${s}</option>`).join('')}
        </select>
      </td>
    </tr>`).join('');
}
async function upd(id,durum){
  await fetch('/api/update-lead',{method:'POST',headers:{'Content-Type':'application/json','x-admin-key':ak},body:JSON.stringify({id,durum})});
  const l=leads.find(x=>x.id===id);if(l)l.durum=durum;stats();render();
}
function openMod(id){
  const l=leads.find(x=>x.id===id);if(!l)return;
  document.getElementById('mc').innerHTML=`
    <div class="mh"><div class="mt">${l.ad||'İsimsiz'}</div><button class="mx" onclick="closeMod()">×</button></div>
    <div class="mr"><span class="ml">Firma</span><span class="mv">${l.firma||'—'}</span></div>
    <div class="mr"><span class="ml">Telefon</span><span class="mv"><a href="tel:${l.telefon}" style="color:var(--green)">${l.telefon||'—'}</a></span></div>
    <div class="mr"><span class="ml">E-posta</span><span class="mv"><a href="mailto:${l.email}" style="color:var(--green)">${l.email||'—'}</a></span></div>
    <div class="mr"><span class="ml">Sektör</span><span class="mv">${l.sektor||'—'}</span></div>
    <div class="mr"><span class="ml">Tarih</span><span class="mv">${fd(l.tarih)}</span></div>
    <hr class="md"/>
    <div class="mr"><span class="ml">Mesaj</span><span class="mv">${l.mesaj||'—'}</span></div>
    <hr class="md"/>
    <div class="mr"><span class="ml">Durum</span>
      <select class="ss" onchange="upd(${l.id},this.value);closeMod()">
        ${['Yeni','İletişime Geçildi','Görüşme Planlandı','Teklif Gönderildi','Müşteri Oldu','Kapandı'].map(s=>`<option ${l.durum===s?'selected':''} value="${s}">${s}</option>`).join('')}
      </select>
    </div>
    <div class="ga">
      <a href="tel:${l.telefon}" class="ab g">📞 Ara</a>
      <a href="mailto:${l.email}" class="ab">✉️ E-posta</a>
    </div>`;
  document.getElementById('mb').classList.add('open');
}
function closeMod(){document.getElementById('mb').classList.remove('open');}
function exportCSV(){
  const h=['Ad Soyad','Firma','Telefon','E-posta','Sektör','Mesaj','Tarih','Durum'];
  const rows=leads.map(l=>[l.ad,l.firma,l.telefon,l.email,l.sektor,l.mesaj,fd(l.tarih),l.durum].map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(','));
  const a=Object.assign(document.createElement('a'),{href:'data:text/csv;charset=utf-8,﻿'+encodeURIComponent([h.join(','),...rows].join('\n')),download:'basvurular.csv'});
  a.click();
}
</script>
</body>
</html>
